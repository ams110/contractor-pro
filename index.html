<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#F59E0B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Contractor Pro" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Contractor Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100%; min-height: 100dvh;
      background: #0B1117;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #E8EDF2;
      direction: rtl;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: pan-y;
    }
    ::-webkit-scrollbar { width: 0; height: 0; }
    input, select, button, textarea { font-family: inherit; touch-action: manipulation; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    #root { min-height: 100%; min-height: 100dvh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
