name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/show-all-tables-KaPwO]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy create-team-member --project-ref rvhjrzbhugvytvktdhor
          supabase functions deploy update-member-password --project-ref rvhjrzbhugvytvktdhor
