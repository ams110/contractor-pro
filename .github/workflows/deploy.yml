name: Deploy Edge Functions

on:
  push:
    branches: [main]

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy create-team-member --project-ref rvhjrzbhugvytvktdhor
          supabase functions deploy update-member-password --project-ref rvhjrzbhugvytvktdhor
          supabase functions deploy send-push --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
          supabase functions deploy send-auth-email --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
          supabase functions deploy worker-webauthn-register-options --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
          supabase functions deploy worker-webauthn-register-verify --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
          supabase functions deploy worker-webauthn-auth-options --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
          supabase functions deploy worker-webauthn-auth-verify --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
          supabase functions deploy webauthn-register-options --project-ref rvhjrzbhugvytvktdhor
          supabase functions deploy webauthn-register-verify --project-ref rvhjrzbhugvytvktdhor
          supabase functions deploy webauthn-auth-options --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
          supabase functions deploy webauthn-auth-verify --project-ref rvhjrzbhugvytvktdhor --no-verify-jwt
