name: Deploy to GitHub Pages

on:
  # نشر تلقائي عند كل دمج/دفع على main
  push:
    branches: [main]
  # تشغيل يدوي من تبويب Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# منع تداخل عمليات النشر — تُلغى القديمة لصالح الأحدث
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_PAGES: 'true'   # vite.config.js → base = /contractor-pro/
        run: npm run build

      - name: SPA fallback (404 = index)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
