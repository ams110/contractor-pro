<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8"><style>
@font-face{font-family:'Cairo';font-weight:700;src:url('file:///home/user/contractor-pro/marketing/video-ad/assets/cairo-arabic-700-normal.woff2');}
@font-face{font-family:'Cairo';font-weight:900;src:url('file:///home/user/contractor-pro/marketing/video-ad/assets/cairo-arabic-900-normal.woff2');}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;font-family:'Cairo',sans-serif;}
:root{--bg:#07080F;--card:#0D0F1C;--text:#F8FAFC;--dim:#64748B;--ok:#22C55E;--amber:#EAB308;--cy:#06B6D4;--or:#F97316;}
body{width:680px;height:1440px;background:var(--bg);color:var(--text);padding:30px;overflow:hidden;}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
.hd .r{font-weight:900;font-size:30px;}
.hd .r small{display:block;font-weight:700;font-size:16px;color:var(--dim);margin-top:2px;}
.hd .ic{width:60px;height:60px;border-radius:17px;background:linear-gradient(135deg,#F97316,#EF4444);display:flex;align-items:center;justify-content:center;}
.hd .ic svg{width:34px;height:34px;color:#fff;}
.card{position:relative;overflow:hidden;border-radius:26px;padding:26px;margin-bottom:22px;}
.c1{background:linear-gradient(135deg,rgba(34,197,94,.12),var(--card) 72%);border:1px solid rgba(34,197,94,.3);}
.c2{background:linear-gradient(135deg,rgba(6,182,212,.12),var(--card) 72%);border:1px solid rgba(6,182,212,.3);}
.cg{position:absolute;width:240px;height:240px;border-radius:50%;inset-inline-end:-60px;top:-60px;filter:blur(4px);}
.ch{display:flex;align-items:center;justify-content:space-between;position:relative;}
.ch .t{font-weight:900;font-size:26px;}
.ch .t small{display:block;font-weight:700;font-size:14px;color:var(--dim);margin-top:2px;}
.ch .chip{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;}
.ch .chip svg{width:26px;height:26px;}
.ring{display:flex;align-items:center;justify-content:center;gap:30px;margin:20px 0 6px;}
.ring .meta{text-align:center;}
.pill{display:inline-block;font-weight:900;font-size:20px;padding:7px 22px;border-radius:11px;margin-top:10px;}
.facs{margin-top:14px;display:flex;flex-direction:column;gap:14px;}
.fac .top{display:flex;justify-content:space-between;font-weight:700;font-size:20px;margin-bottom:7px;}
.fac .track{height:13px;border-radius:7px;background:#1a1f2e;overflow:hidden;}
.fac .fill{height:100%;border-radius:7px;}
.bn{font-weight:900;font-size:60px;letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--ok);margin-top:8px;}
.tags{display:flex;gap:10px;margin-top:6px;}
.tag{font-weight:900;font-size:18px;padding:7px 16px;border-radius:10px;}
</style></head><body>

<div class="hd">
  <div class="r">الرئيسية<small>نظرة سريعة على مصلحتك</small></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1Z"/><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M4 15v-3a6 6 0 0 1 6-6"/><path d="M14 6a6 6 0 0 1 6 6v3"/></svg></div>
</div>

<div class="card c1">
  <div class="cg" style="background:radial-gradient(circle,rgba(34,197,94,.4),transparent 70%)"></div>
  <div class="ch"><div class="t">نبض المصلحة<small>تحليل ذكي لصحّة مصلحتك المالية</small></div>
    <div class="chip" style="background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:var(--ok)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg></div>
  </div>
  <div style="position:relative;height:200px;display:flex;align-items:center;justify-content:center;margin:14px 0 6px">
    <svg width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="84" fill="none" stroke="#1a2230" stroke-width="16"/><circle cx="100" cy="100" r="84" fill="none" stroke="#22C55E" stroke-width="16" stroke-linecap="round" stroke-dasharray="528" stroke-dashoffset="68" transform="rotate(-90 100 100)"/></svg>
    <div style="position:absolute;text-align:center"><div><span style="font-weight:900;font-size:66px">88</span><span style="font-weight:700;font-size:24px;color:var(--dim)">/100</span></div><div class="pill" style="background:rgba(34,197,94,.16);color:var(--ok);border:1px solid rgba(34,197,94,.4);margin-top:4px">ممتازة</div></div>
  </div>
  <div class="facs">
    <div class="fac"><div class="top"><span style="color:var(--ok)">90</span><span>السيولة</span></div><div class="track"><div class="fill" style="width:90%;background:linear-gradient(90deg,#16A34A,#22C55E)"></div></div></div>
    <div class="fac"><div class="top"><span style="color:var(--ok)">84</span><span>الربحية</span></div><div class="track"><div class="fill" style="width:84%;background:linear-gradient(90deg,#16A34A,#22C55E)"></div></div></div>
    <div class="fac"><div class="top"><span style="color:var(--ok)">88</span><span>التحصيل</span></div><div class="track"><div class="fill" style="width:88%;background:linear-gradient(90deg,#16A34A,#22C55E)"></div></div></div>
    <div class="fac"><div class="top"><span style="color:var(--amber)">79</span><span>تسوية العمّال</span></div><div class="track"><div class="fill" style="width:79%;background:linear-gradient(90deg,#CA8A04,#EAB308)"></div></div></div>
  </div>
</div>

<div class="card c2">
  <div class="cg" style="background:radial-gradient(circle,rgba(6,182,212,.4),transparent 70%)"></div>
  <div class="ch"><div class="t">التوقّع الذكي للسيولة<small>سيولتك المتوقّعة بعد 3 أشهر</small></div>
    <div class="chip" style="background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.4);color:var(--cy)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
  </div>
  <div class="bn">₪306,914</div>
  <div class="tags"><span class="tag" style="background:rgba(34,197,94,.15);color:var(--ok)">+74,238₪/شهر</span><span class="tag" style="background:rgba(6,182,212,.12);color:var(--cy)">الوضع: مستقرّ</span></div>
  <svg width="100%" height="150" viewBox="0 0 600 150" preserveAspectRatio="none" style="margin-top:16px">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22C55E" stop-opacity="0.35"/><stop offset="1" stop-color="#22C55E" stop-opacity="0"/></linearGradient></defs>
    <path d="M0,120 L120,100 L240,108 L360,72 L360,150 L0,150 Z" fill="url(#g)"/>
    <polyline points="0,120 120,100 240,108 360,72" fill="none" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="360,72 480,52 600,24" fill="none" stroke="#22C55E" stroke-width="5" stroke-dasharray="10 10" stroke-linecap="round"/>
    <circle cx="360" cy="72" r="8" fill="#22C55E"/>
  </svg>
</div>

</body></html>
