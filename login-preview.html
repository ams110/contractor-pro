<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contractor Pro — Login Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #07090D;
    color: #F8FAFC;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Blobs */
  .blob { position: absolute; border-radius: 50%; pointer-events: none; }
  .blob-1 { top: -20%; right: -20%; width: 500px; height: 500px; background: radial-gradient(circle, #00DDB318 0%, transparent 70%); }
  .blob-2 { bottom: -15%; left: -15%; width: 420px; height: 420px; background: radial-gradient(circle, #6366F118 0%, transparent 70%); }

  .container { width: 100%; max-width: 400px; position: relative; z-index: 1; }

  /* Logo */
  .logo-section { text-align: center; margin-bottom: 36px; }
  .logo-icon {
    width: 80px; height: 80px;
    border-radius: 22px;
    background: linear-gradient(135deg, #00DDB3, #6366F1);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    margin: 0 auto 16px;
    box-shadow: 0 16px 48px #00DDB344;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .logo-title {
    font-size: 26px; font-weight: 900;
    background: linear-gradient(135deg, #00DDB3, #6366F1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub { font-size: 13px; color: #64748B; margin-top: 6px; letter-spacing: 0.04em; }

  /* Card */
  .card {
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(28px);
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.10);
    padding: 28px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: fadeUp .4s cubic-bezier(0.22,1,0.36,1) both;
    animation-delay: 0.1s;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* Tabs */
  .tabs-wrap { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 18px; padding: 4px; margin-bottom: 20px; }
  .tab {
    flex: 1; padding: 9px 4px; border-radius: 14px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 700; transition: all .2s; font-family: inherit;
    color: #64748B; background: transparent;
  }
  .tab.active {
    background: linear-gradient(135deg, #00DDB3, #6366F1);
    color: #07090D;
    box-shadow: 0 4px 14px #00DDB344;
  }

  /* Owner mode tabs */
  .mode-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 18px; padding: 4px; margin-bottom: 22px; }
  .mode-tab { flex: 1; padding: 10px 4px; border-radius: 14px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; transition: all .2s; font-family: inherit; color: #64748B; background: transparent; }
  .mode-tab.active { background: linear-gradient(135deg, #00DDB3, #6366F1); color: #07090D; box-shadow: 0 4px 14px #00DDB344; }

  /* Form */
  .field { margin-bottom: 16px; }
  .field-label { display: block; font-size: 11px; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
  .field-wrap { position: relative; }
  .field-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #64748B; pointer-events: none; }
  .field-icon svg { width: 15px; height: 15px; display: block; }
  .field-input {
    width: 100%; padding: 13px 14px 13px 36px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; color: #F8FAFC; font-size: 14px;
    font-family: inherit; outline: none;
    transition: all .2s;
  }
  .field-input::placeholder { color: #64748B; }
  .field-input:focus { border-color: rgba(0,221,179,0.5); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(0,221,179,0.12); }
  .field-input-ltr { direction: ltr; text-align: left; }
  .eye-btn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #64748B; cursor: pointer; padding: 0; display: flex; }
  .eye-btn svg { width: 15px; height: 15px; }

  /* Submit button */
  .submit-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #00DDB3, #6366F1);
    border: none; border-radius: 14px;
    color: #07090D; font-size: 14px; font-weight: 800;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 0 22px #00DDB344;
    transition: all .15s;
    margin-top: 4px;
  }
  .submit-btn:hover { filter: brightness(1.08); box-shadow: 0 0 32px #00DDB455; }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn svg { width: 15px; height: 15px; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
  .divider-text { font-size: 11px; color: #64748B; }

  /* Alt login buttons */
  .alt-btns { display: flex; gap: 10px; }
  .alt-btn {
    flex: 1; padding: 13px; border-radius: 14px;
    font-size: 13px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all .2s; font-family: inherit;
  }
  .alt-btn.pin { border: 1px solid rgba(99,102,241,0.35); background: rgba(99,102,241,0.10); color: #6366F1; }
  .alt-btn.passkey { border: 1px solid rgba(0,221,179,0.35); background: rgba(0,221,179,0.10); color: #00DDB3; }
  .alt-btn:hover { filter: brightness(1.15); }
  .alt-btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="container">
  <!-- Logo -->
  <div class="logo-section">
    <div class="logo-icon">🏗️</div>
    <div class="logo-title">Contractor Pro</div>
    <div class="logo-sub">إدارة مشاريع المقاولات</div>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- Login type tabs -->
    <div class="tabs-wrap">
      <button class="tab active">🏢 صاحب العمل</button>
      <button class="tab">👥 عضو فريق</button>
      <button class="tab">👷 عامل</button>
    </div>

    <!-- Owner mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active">دخول</button>
      <button class="mode-tab">حساب جديد</button>
      <button class="mode-tab">نسيت المرور</button>
    </div>

    <!-- Form fields -->
    <div class="field">
      <label class="field-label">البريد الإلكتروني</label>
      <div class="field-wrap">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input class="field-input field-input-ltr" type="email" placeholder="example@email.com" />
      </div>
    </div>

    <div class="field">
      <label class="field-label">كلمة المرور</label>
      <div class="field-wrap">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input class="field-input" type="password" placeholder="••••••••" style="padding-left:40px" />
        <button class="eye-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button class="submit-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      دخول
    </button>

    <!-- Divider + alt buttons -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">أو</span>
      <div class="divider-line"></div>
    </div>

    <div class="alt-btns">
      <button class="alt-btn pin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="4" y1="9" y2="20"/><line x1="8" x2="8" y1="9" y2="20"/><line x1="12" x2="12" y1="9" y2="20"/><line x1="16" x2="16" y1="9" y2="20"/><line x1="20" x2="20" y1="9" y2="20"/><path d="M4 4h16"/></svg>
        PIN
      </button>
      <button class="alt-btn passkey">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v1"/><path d="M12 21v1"/><path d="M4.22 4.22l.71.71"/><path d="M19.07 19.07l.71.71"/><path d="M2 12h1"/><path d="M21 12h1"/><path d="M4.22 19.78l.71-.71"/><path d="M19.07 4.93l.71-.71"/><circle cx="12" cy="12" r="4"/></svg>
        بصمة
      </button>
    </div>
  </div>
</div>

<script>
  // Tab switching demo
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
    })
  })
  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
    })
  })
  // Eye toggle
  document.querySelector('.eye-btn').addEventListener('click', function() {
    const inp = this.previousElementSibling
    inp.type = inp.type === 'password' ? 'text' : 'password'
  })
</script>
</body>
</html>
